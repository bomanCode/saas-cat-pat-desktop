name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v2.0.0 && git push origin v2.0.0
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            build-essential \
            libssl-dev \
            libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal builds need both targets even on Apple Silicon runners.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run frontend checks before bundling
        run: |
          npm run typecheck
          npm run test

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing (recommended before public release — unsigned
          # builds trigger OS security warnings on first launch):
          #   macOS:   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
          #            APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD,
          #            APPLE_TEAM_ID
          #   Windows: TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          # Add these as repo secrets, then uncomment below. See
          # PRODUCTION_CHECKLIST.md "Code signing" section.
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Comnyang ${{ github.ref_name }}"
          releaseBody: "See docs/roadmap.md for what's in this build. Installers below are unsigned until code signing secrets are configured (PRODUCTION_CHECKLIST.md)."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
