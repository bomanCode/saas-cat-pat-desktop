# ============================================================
# Comnyang 2.0 — Podman Compose Dev Environment
# Compatible with: Podman 4+ on WSL2 Ubuntu / Windows 11
# ============================================================
#
# USAGE:
#   podman-compose up -d --build      # build + start (first run)
#   podman-compose up -d              # start (subsequent runs)
#   podman-compose down               # stop + remove containers
#   podman-compose logs -f dev        # follow dev container logs
#   podman exec -it comnyang_dev bash # shell into dev container
#
# INSIDE THE DEV CONTAINER you can run:
#   cargo check          # verify Rust compiles
#   cargo fmt --check    # verify formatting
#   cargo clippy         # run linter
#   cargo test           # run Rust unit tests
#   npm run build        # build frontend (Vite)
#   npm run typecheck    # TypeScript check
#   npm run test         # Vitest unit tests
#
# DO NOT run `tauri dev` or `tauri build` inside the container.
# Tauri needs a native OS window + GPU compositor.
# Run those commands on the WSL2 host terminal directly.
# ============================================================

version: "3.8"

# ------------------------------------------------------------------
# Named Volumes
# ------------------------------------------------------------------
volumes:
  # Persistent SQLite data — survives container restarts.
  sqlite_data:
    driver: local

  # Cargo registry cache — avoids re-downloading crates on restart.
  cargo_registry:
    driver: local

  # Cargo git source cache.
  cargo_git:
    driver: local

# ------------------------------------------------------------------
# Services
# ------------------------------------------------------------------
services:

  # ----------------------------------------------------------------
  # sqlite-init
  # One-shot: bootstraps the database from db/schema.sql on first
  # run. Subsequent runs skip because the file already exists.
  # ----------------------------------------------------------------
  sqlite-init:
    image: nouchka/sqlite3:latest
    container_name: comnyang_sqlite_init
    volumes:
      - sqlite_data:/data
      - ./db:/sql:ro,z
    # IMPORTANT: nouchka/sqlite3's image ENTRYPOINT is `sqlite3` itself, not
    # a shell. Without this override, `command: sh -c "..."` was being run
    # as `sqlite3 sh -c "..."` — i.e. "sh" was treated as the database
    # filename and "-c" as an (invalid) sqlite3 flag, crashing immediately
    # with `sqlite3: Error: unknown option: -c` (Exited 1), which then
    # blocked the `dev` service via `depends_on` below. Overriding the
    # entrypoint to an actual shell fixes this: see Comnyang issue found
    # during Windows/WSL2 manual QA.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ ! -f /data/comnyang.db ]; then
          echo 'Bootstrapping database from schema.sql...'
          sqlite3 /data/comnyang.db < /sql/schema.sql
          echo 'Done.'
        else
          echo 'Database already exists — skipping init.'
        fi
    restart: "no"

  # ----------------------------------------------------------------
  # dev
  # Headless container: Node 24 + Rust stable + Tauri Linux deps.
  # Built from Dockerfile.dev (node:24-bookworm base — always public).
  #
  # First run: `podman-compose up -d --build`  (builds the image)
  # Later runs: `podman-compose up -d`         (uses cached image)
  # ----------------------------------------------------------------
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: comnyang-dev:latest
    container_name: comnyang_dev
    working_dir: /workspace
    volumes:
      # Live project source (edits on host are instant inside container)
      - .:/workspace:z
      # Shared SQLite data from sqlite-init service
      - sqlite_data:/workspace/sqlite_data:z
      # Cargo caches (persist across container rebuilds for fast cargo check)
      - cargo_registry:/usr/local/cargo/registry:z
      - cargo_git:/usr/local/cargo/git:z
    environment:
      # Logging
      - RUST_LOG=${RUST_LOG:-comnyang=info,sqlx=warn}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-1}
      # Node
      - NODE_ENV=${NODE_ENV:-development}
      # Database (shared volume path)
      - DATABASE_URL=sqlite:/workspace/sqlite_data/comnyang.db
      # Analytics disabled inside container
      - POSTHOG_API_KEY=
      - POSTHOG_HOST=https://app.posthog.com
      # AI keys forwarded from host .env (blank = disabled)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # Ollama: reach host Windows instance from inside WSL2 container
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.containers.internal:11434}
      # Dev override: check for rare events every 60s instead of 1h
      - COMNYANG_RARE_EVENT_INTERVAL_SECS=60
    # No `depends_on` here by design: `cargo check`/`cargo test` never need
    # a live DB (this codebase uses runtime-checked `sqlx::query()`, never
    # the compile-time `sqlx::query!()` macro), so there's nothing for
    # `dev` to actually wait on. A prior version had a hard `depends_on`
    # on sqlite-init, which meant an unrelated sqlite-init bug (fixed
    # above) completely blocked `dev` from starting too — that coupling
    # served no purpose, so it's removed rather than made conditional
    # (newer depends_on condition/required syntax has inconsistent support
    # across podman-compose implementations — not worth the risk here).
    restart: unless-stopped
